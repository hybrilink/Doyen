<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors-ligne - Faculté Agronomique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .offline-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .offline-icon {
            font-size: 80px;
            color: #ffb347;
            margin-bottom: 20px;
        }
        .retry-btn {
            background: #003366;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .retry-btn:hover {
            background: #002244;
            transform: translateY(-2px);
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 15px;
        }
        .status-offline {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <i class="bi bi-wifi-off"></i>
        </div>
        <h2 class="text-primary mb-3">Vous êtes hors-ligne</h2>
        <p class="text-muted">
            Vous n'êtes pas connecté à Internet. Certaines fonctionnalités peuvent être limitées.
        </p>
        <div class="alert alert-info mt-3">
            <i class="bi bi-info-circle me-2"></i>
            Les paiements effectués hors-ligne seront synchronisés automatiquement à la reconnexion.
        </div>
        <div>
            <span class="status-badge status-offline">
                <i class="bi bi-wifi-off me-1"></i> Mode hors-ligne
            </span>
        </div>
        <button class="retry-btn" onclick="window.location.reload()">
            <i class="bi bi-arrow-repeat me-2"></i>Réessayer la connexion
        </button>
        <hr class="my-4">
        <div class="row">
            <div class="col-6">
                <button class="btn btn-outline-primary w-100" onclick="window.location.href='/index.html'">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </button>
            </div>
            <div class="col-6">
                <button class="btn btn-outline-success w-100" onclick="window.location.href='/dashboard-comptabilite.html'">
                    <i class="bi bi-credit-card"></i> Paiements
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Vérifier périodiquement la connexion
        setInterval(() => {
            if (navigator.onLine) {
                window.location.reload();
            }
        }, 5000);
    </script>
</body>
</html>
